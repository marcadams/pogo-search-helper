        <p>Build complex Pokémon GO search strings visually with AND (&amp;), OR (,), and NOT (!) logic. Choose from over 130 search tokens across 14 categories: Appraisal (0*, 1*, 2*, 3*, 4*), Status (shiny, lucky, shadow, purified, legendary, mythical), Type (all 18 types), Move filtering (@fire, @water, etc.), Evolution state, Catch Source (hatched, traded, raid), Region (Kanto through Paldea), Gender, Size (xxs, xxl), Buddy status, Age &amp; Year, and more. Save your favorite searches for quick access.</p>
        <h3>Popular Pokémon GO Search Strings</h3>
        <ul>
          <li><code>4*&shiny</code> — Perfect IV shinies</li>
          <li><code>3*,4*&!shadow&!purified</code> — High IV non-shadow Pokemon for raids</li>
          <li><code>age0&!4*&!3*&!shiny&!legendary&!mythical</code> — Today's catches safe to transfer</li>
          <li><code>cp10-&!shiny&!4*&!legendary</code> — Low CP trash to mass transfer</li>
          <li><code>@1water,@2water,@3water</code> — Pokemon with Water-type moves in any slot</li>
        </ul>
      </article>

        <p>Counter search strings for 119+ raid bosses updated for July 2026. Current rotation includes Articuno, Zapdos, Moltres, Kyogre, Solgaleo, Kyurem, Shadow Palkia, Mega Lucario, Mega Sceptile, Mega Salamence, and Dynamax raids. Copy the counter string and paste it into Pokémon GO to instantly filter your storage for super-effective attackers with moves in all three attack slots (@1type, @2type, @3type).</p>
        <h3>Raid Boss Counter Examples</h3>
        <ul>
          <li>Mewtwo — weak to Bug, Ghost, Dark: <code>@1ghost,@2ghost,@3ghost,@1dark,@2dark,@3dark,@1bug,@2bug,@3bug</code></li>
          <li>Kyogre — weak to Grass, Electric: <code>@1grass,@2grass,@3grass,@1electric,@2electric,@3electric</code></li>

        </ul>
      </article>
      <article id="pvp">
        <h2>PvP IV Rank Checker — Great League, Ultra League, Master League</h2>
        <p>Calculate your Pokémon's PvP IV rank out of 4,096 possible combinations for 110+ species. In Great League (1500 CP cap) and Ultra League (2500 CP cap), lower Attack IVs combined with higher Defense and HP IVs produce more total stats because the Pokémon can be powered to a higher level while staying under the CP cap. The CP formula weights Attack more heavily, so 0/15/15 is often better than 15/15/15 in capped leagues.</p>
        <h3>How PvP IV Ranking Works</h3>
        <p>CP = Floor(Atk × √Def × √HP × CPM² / 10). Attack IV has ~2x weight in CP vs Defense/HP. Lower Attack lets you power up more levels, gaining stats from the CP Multiplier (CPM). Each level adds roughly 1.3% more stats. A rank 1 IV spread often gains 5-10% more stat product than a hundo (15/15/15).</p>
      </article>
      <article id="types">
        <h2>Pokémon GO Type Effectiveness Chart — All 18 Type Matchups</h2>
        <p>Interactive 18×18 type chart using Pokémon GO's actual damage multipliers. Super effective = 1.6x damage, not very effective = 0.625x damage, double resistance (immune in main series) = 0.391x damage. Pokémon GO does not have true immunities — Normal vs Ghost still deals 0.391x. Tap any type to see what it's strong and weak against, both offensively and defensively.</p>
      </article>
      <article id="tips">
        <h2>Pokémon GO Tips and Tricks 2026 — Catch Rate, PvP, XP, Stardust</h2>
        <p>Catch rate multipliers stack multiplicatively: Ultra Ball (2.0x) + Golden Razz Berry (2.5x) + Excellent Throw (up to 2.0x) + Curve Ball (1.7x) = up to 17x base catch rate. PvP tips for the June 2026 battle system overhaul: 45-second switch timer, charged move priority (CMP), shield management. Stardust optimization with Star Pieces, weather boost, and egg hatching. Trading mechanics: Lucky Friends guarantee, distance trades for XL candy, and special trade limits.</p>
      </article>

      </article>
